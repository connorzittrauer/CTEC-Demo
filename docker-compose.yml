# Defines the container for the PostgreSQL database
services:
  frontend:
    build: ./frontend
    container_name: auth-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
  backend:
    build: ./backend
    container_name: auth-backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app   
    env_file:
      - ./backend/.env
    depends_on:
      - db
  db:
    image: postgres:15
    container_name: auth-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: authdb
    ports:
      - "5432:5432"
    # Runs the db initialization script on startup
    volumes:
      - ./db/initialize.sql:/docker-entrypoint-initdb.d/initialize.sql

