services:
  # currently set to dev mode, change to production Dockerfile for production deployment
  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile.dev
    container_name: auth-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: auth-backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: auth-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: authdb
    ports:
      - "5432:5432"
    volumes:
      - ./db/initialize.sql:/docker-entrypoint-initdb.d/initialize.sql